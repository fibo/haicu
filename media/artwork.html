<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>&lrm;</title>
		<link rel="icon" href="data:image/x-icon;base64,AA">

		<!-- Orbitron font -->
		<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

		<style>
			:root {
				--shadow-color: #bbb;
				--shadow-offset: 4px;
				--box-shadow: var(--shadow-color) var(--shadow-offset) var(--shadow-offset) 0px 0px;
				--text-shadow: var(--shadow-color) var(--shadow-offset) var(--shadow-offset);
			}

			body {
				font-family: Helvetica, sans-serif;
			}

			.logo {
				font-family: "Orbitron", sans-serif;
				font-optical-sizing: auto;
				font-weight: 500;
				font-style: normal;

				width: 512px;
				height: 512px;
				border-radius: 100%;
				background: #eee;

				display: grid;
				place-items: center;
				grid-template-columns: repeat(16, 32px);
				grid-template-rows: repeat(16, 32px);
			}

			.ha {
				font-size: 71px;
				grid-row: 6 / 4;
				grid-column: 5 / 4;

				color: #111;
				text-align: center;

				--shadow-color: #bbb;
				--shadow-offset: 4px;
				text-shadow: var(--shadow-color) var(--shadow-offset) var(--shadow-offset);
			}

			.icu {
				font-size: 150px;
				width: 350px;
				height: 350px;

				grid-row: 6 / 12;
				grid-column: 6 / 12;

				display: grid;
				place-items: center;

				background: #111;
				color: #eee;

				--shadow-offset: 8px;
				--shadow-color: #aaa;
				box-shadow: var(--shadow-color) var(--shadow-offset) var(--shadow-offset) 0px 0px;

				corner-shape: notch;
				border-radius: 95px calc(var(--shadow-offset) * 2) 40px 0px;

			}

			.social-preview {
				max-width: 1280px;
				height: 640px;

				display: flex;
				gap: 100px;
				align-items: center;
				justify-content: center;

				background: #fafafa;
			}

			.description {
				font-size: 40px;
				display: flex;
				flex-direction: column;
			}
		</style>
	</head>
	<body>
		<h1>haICU artwork</h1>

		<p>The <em>logo</em> uses <a href="https://fonts.google.com/specimen/Orbitron">Orbitron font</a>.</p>

		<p>Images can be exported using <em>Capture node screenshot</em> feature on Chrome.</p>

		<h2>Logo</h2>

		<p>Square logo with 512px size.</p>

		<div class=logo>
			<div class=ha>ha</div>
			<div class=icu>ICU</div>
		</div>

		<h2>Social preview</h2>

		<p>To be used on GitHub settings.</p>

		<div class=social-preview>
			<div class=logo>
				<div class=ha>ha</div>
				<div class=icu>ICU</div>
			</div>

			<div class=description>
				<div>tiny ICU message parser</div>
			</div>
		</div>
	</body>
</html>
